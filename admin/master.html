<!DOCTYPE html>
<html>
<head>
  <title>Testing | Admin - Master Data</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="logo">🧪 Testing</div>
  <div class="user">
    Admin
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- ===== Layout ===== -->
<div class="layout">

  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="master.html">🗂 Master Data</a>
    <a href="employees.html">👥 Employees</a>
    <a href="attendance.html">⏱ Attendance</a>
    <a href="payroll.html">💰 Payroll</a>
    <a href="reports.html">📄 Reports</a>
  </div>

  <!-- ===== Content ===== -->
  <div class="content">
    <h1>🗂 Master Data</h1>

    <!-- ===== Location ===== -->
    <h2>📍 上班地點（Location）</h2>
    <input id="locationInput" placeholder="輸入上班地點">
    <button onclick="addLocation()">新增</button>
    <ul id="locationList"></ul>

    <!-- ===== Department ===== -->
    <h2>🏢 部門（Department）</h2>
    <input id="deptInput" placeholder="輸入部門名稱">
    <button onclick="addDepartment()">新增</button>
    <ul id="deptList"></ul>

    <!-- ===== Job Type ===== -->
    <h2>🛠 工種（Job Type）</h2>
    <input id="jobInput" placeholder="輸入工種名稱">
    <button onclick="addJob()">新增</button>
    <ul id="jobList"></ul>

    <!-- ===== Shift / Post ===== -->
    <h2>⏰ 班次 / 崗位（Shift / Post）</h2>
    <input id="shiftInput" placeholder="輸入班次 / 崗位">
    <button onclick="addShift()">新增</button>
    <ul id="shiftList"></ul>

  </div>
</div>

<!-- ===== Script ===== -->
<script>
  /* ===== 權限守門 ===== */
  if (localStorage.getItem("role") !== "admin") {
    window.location.href = "../login.html";
  }

  function logout() {
    localStorage.removeItem("role");
    window.location.href = "../login.html";
  }

  /* ===== Location ===== */
  const locations = [];

  function addLocation() {
    const input = document.getElementById("locationInput");
    const value = input.value.trim();
    if (!value) return;

    locations.push(value);
    input.value = "";
    renderLocations();
  }

  function renderLocations() {
    const ul = document.getElementById("locationList");
    ul.innerHTML = "";
    locations.forEach(loc => {
      const li = document.createElement("li");
      li.innerText = loc;
      ul.appendChild(li);
    });
  }

  /* ===== Department ===== */
  const departments = [];

  function addDepartment() {
    const input = document.getElementById("deptInput");
    const value = input.value.trim();
    if (!value) return;

    departments.push(value);
    input.value = "";
    renderDepartments();
  }

  function renderDepartments() {
    const ul = document.getElementById("deptList");
    ul.innerHTML = "";
    departments.forEach(dep => {
      const li = document.createElement("li");
      li.innerText = dep;
      ul.appendChild(li);
    });
  }

  /* ===== Job Type ===== */
  const jobs = [];

  function addJob() {
    const input = document.getElementById("jobInput");
    const value = input.value.trim();
    if (!value) return;

    jobs.push(value);
    input.value = "";
    renderJobs();
  }

  function renderJobs() {
    const ul = document.getElementById("jobList");
    ul.innerHTML = "";
    jobs.forEach(job => {
      const li = document.createElement("li");
      li.innerText = job;
      ul.appendChild(li);
    });
  }

  /* ===== Shift / Post ===== */
  const shifts = [];

  function addShift() {
    const input = document.getElementById("shiftInput");
    const value = input.value.trim();
    if (!value) return;

    shifts.push(value);
    input.value = "";
    renderShifts();
  }

  function renderShifts() {
    const ul = document.getElementById("shiftList");
    ul.innerHTML = "";
    shifts.forEach(shift => {
      const li = document.createElement("li");
      li.innerText = shift;
      ul.appendChild(li);
    });
  }
</script>

</body>
</html>
