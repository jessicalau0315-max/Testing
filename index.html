<!DOCTYPE html>
<html>
<head>
  <title>公司工資計算系統</title>
</head>
<body>
  <h1>💰 公司工資計算</h1>

  <label>員工姓名：</label>
  <input id="name"><br><br>

  <label>工時（小時）：</label>
  <input id="hours" type="number"><br><br>

  <label>時薪（HKD）：</label>
  <input id="rate" type="number"><br><br>

  <button onclick="calculate()">計算人工</button>

  <h2 id="result"></h2>

  <script>
    function calculate() {
      const hours = document.getElementById("hours").value;
      const rate = document.getElementById("rate").value;
      const salary = hours * rate;
      document.getElementById("result").innerText =
        "總人工：HKD " + salary;
    }
  </script>
</body>
</html>
